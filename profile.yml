bio: |
  I am trained as an economist, currently working at the Indian Institute of Management,
  Indore as Professor in the area of Economics.

  I hold a Ph.D. in Development Studies from the Indira Gandhi Institute of Development
  Research (IGIDR), Mumbai.

  My research interests include labour economics, urban and regional economics,
  development and public economics, and competition policy. My current work focuses on
  labour mobility — commuting and migration — the spatial nature of economic development,
  and urbanisation in the Indian context. I also have interest in the empirical and
  theoretical aspects of competition policy.

  My teaching interests include microeconomics, applied econometrics, development
  economics, labour economics, and competition policy.

research_interests:
  - Labour Economics
  - Urban & Regional Economics
  - Development Economics
  - Public Economics
  - Competition Policy
  - Labour Mobility
  - Commuting
  - Migration
  - Urbanisation
  - Spatial Economics
  - Tax Competition
  - Industrial Organisation
